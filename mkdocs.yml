site_name: NLEx Documentation
site_url: https://nlex-team.github.io/NLEx
site_description: NLEx — Natural Language to SQL platform documentation
repo_url: https://github.com/NLEx-team/NLEx
repo_name: NLEx-team/NLEx

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes

nav:
  - Home: index.md
  - Architecture:
    - System Overview: architecture/overview.md
    - Services & Configuration: architecture/services.md
    - Network & Communication: architecture/network.md
    - Database Schema: architecture/database.md
  - Deployment:
    - Docker Compose: deployment/docker-compose.md
    - Per-Service (DevOps): deployment/per-service.md
    - Environment Variables: deployment/environment.md
  - Development:
    - Roadmap: roadmap.md
    - Contributing: contributing.md
    - Testing: testing.md
  - Quality:
    - Quality Requirements: quality-requirements.md
    - Quality Requirement Tests: quality-requirement-tests.md
    - User Acceptance Tests: user-acceptance-tests.md
    - Definition of Done: definition-of-done.md
