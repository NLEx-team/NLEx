site_name: NLEx Documentation
site_description: NLEx — Natural Language to SQL service documentation
site_author: NLEx Team
repo_url: https://github.com/NLEx-team/NLEx
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    primary: indigo
    accent: indigo
  font:
    text: Roboto
    code: Fira Code
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - toc.integrate
    - toc.follow
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NLEx-team/NLEx

nav:
  - Home: index.md
  - Roadmap: roadmap.md
  - Architecture:
    - Overview: architecture/README.md
    - Static View: architecture/static-view/component-diagram.md
    - Dynamic View: architecture/dynamic-view/sequence-diagram.md
    - Deployment View: architecture/deployment-view/deployment-diagram.md
    - Architecture Decision Records:
      - 'ADR-001: Trino for Distributed Queries': architecture/adr/001-trino-for-distributed-queries.md
      - 'ADR-002: JWT Authentication Middleware': architecture/adr/002-jwt-authentication-middleware.md
      - 'ADR-003: Orchestrator State Machine': architecture/adr/003-orchestrator-state-machine-for-ambiguity.md
  - Development Process: development-process.md
  - Definition of Done: definition-of-done.md
  - Quality Requirements: quality-requirements.md
  - Quality Requirement Tests: quality-requirement-tests.md
  - Testing Strategy: testing.md
  - User Acceptance Tests: user-acceptance-tests.md
