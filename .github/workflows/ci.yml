name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        env:
          # Self-contained config: no external services or GitHub secrets needed.
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          ADMIN_EMAIL: "admin@example.com"
          ADMIN_PASSWORD: "ci-admin-password"
          JWT_SECRET_KEY: "ci-jwt-secret"
          JWT_ALGORITHM: "HS256"
          OPENAI_API_KEY: "sk-ci-dummy"
          ENVIRONMENT: "test"
          EXPORTS_DIR: "/tmp/nlex-exports"
        run: |
          # Integration tests (Trino / real DBs / LLM) are excluded here; they
          # run via the docker-compose `test` profile with live infrastructure.
          python -m pytest -m "not integration" tests/ -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check and build
        working-directory: frontend
        run: npm run build
