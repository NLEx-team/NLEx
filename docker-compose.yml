services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Trino ---
  trino:
    image: trinodb/trino:481
    restart: unless-stopped
    ports:
      - "${TRINO_PORT}:8080"

  # --- Development Services ---
  # Run with: docker compose --profile dev up
  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      target: development
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend/src:/app/src
    env_file:
      - .env.secret
    depends_on:
      - db
      - trino
    restart: unless-stopped

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      target: development
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env.secret
    depends_on:
      - backend-dev
      - db
      - trino
    restart: unless-stopped

  # --- Production Services ---
  # Run with: docker compose --profile prod up
  backend-prod:
    profiles: ["prod"]
    build:
      context: ./backend
      target: production
    ports:
      - "${BACKEND_PORT}:8000"
    env_file:
      - .env.secret
    depends_on:
      - db
      - trino
    restart: always

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      target: production
    ports:
      - "${FRONTEND_PORT}:80"
    env_file:
      - .env.secret
    depends_on:
      - backend-prod
      - db
      - trino
    restart: always

  # --- Testing Service ---
  # Run with: docker compose --profile test up
  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    env_file:
      - .env.secret
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=sqlite:///./test.db
    command: python -m pytest tests/
    depends_on:
      - db
      - trino

volumes:
  postgres_data:
