services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Trino ---
  trino:
    image: trinodb/trino:481
    restart: unless-stopped
    ports:
      - "${TRINO_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    volumes:
      - ./trino-config.properties:/etc/trino/config.properties:ro

  # --- Development Services ---
  # Run with: docker compose --profile dev up
  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      target: development
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend/src:/app/src
    env_file:
      - .env.secret
    depends_on:
      - db
      - trino
    restart: unless-stopped

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      target: development
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env.secret
    depends_on:
      - backend-dev
      - db
      - trino
    restart: unless-stopped

  # --- Production Services ---
  # Run with: docker compose --profile prod up
  backend-prod:
    profiles: ["prod"]
    build:
      context: ./backend
      target: production
    ports:
      - "${BACKEND_PORT}:8000"
    env_file:
      - .env.secret
    depends_on:
      - db
      - trino
    restart: always

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      target: production
    ports:
      - "${FRONTEND_PORT}:80"
    env_file:
      - .env.secret
    depends_on:
      - backend-prod
      - db
      - trino
    restart: always

  # --- Testing Services ---
  # Run with: docker compose --profile test up
  postgres-test:
    profiles: ["test"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/pytest.ini:/app/pytest.ini
    env_file:
      - .env.secret
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=sqlite:///./test.db
      - TRINO_HOST=trino
      - TRINO_PORT=8080

      - TEST_POSTGRES_HOST=postgres-test
      - TEST_POSTGRES_PORT=5432
      - TEST_POSTGRES_DB=testdb
      - TEST_POSTGRES_USER=test
      - TEST_POSTGRES_PASSWORD=test
    command: python -m pytest tests/
    depends_on:
      db:
        condition: service_started
      trino:
        condition: service_healthy
      postgres-test:
        condition: service_healthy

volumes:
  postgres_data:
