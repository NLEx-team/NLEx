services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-net

  # --- Trino ---
  trino:
    image: trinodb/trino:481
    restart: unless-stopped
    ports:
      - "${TRINO_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    volumes:
      - ./trino-config.properties:/etc/trino/config.properties:ro
      - trino_catalogs:/etc/trino/catalog
    networks:
      - app-net
      - shared-net

  # --- Development Services ---
  # Run with: docker compose --profile dev up
  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      target: development
      # args:
      #   - API_URL=${API_URL}
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend/src:/app/src
      - exports_data:/app/exports
    env_file:
      - .env.secret
    depends_on:
      db:
        condition: service_healthy
      trino:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-net

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      target: development
      # args:
      #   - VITE_API_URL=${VITE_API_URL}
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env.secret
    depends_on:
      - backend-dev
      - db
      - trino
    restart: unless-stopped
    networks:
      - app-net

  # --- Production Services ---
  # Run with: docker compose --profile prod up
  backend-prod:
    profiles: ["prod"]
    build:
      context: ./backend
      target: production
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - exports_data:/app/exports
    env_file:
      - .env.secret
    depends_on:
      - db
      - trino
    restart: always
    networks:
      - app-net

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      target: production
    ports:
      - "${FRONTEND_PORT}:80"
    env_file:
      - .env.secret
    depends_on:
      - backend-prod
      - db
      - trino
    restart: always
    networks:
      - app-net

  # --- Testing Services ---
  # Run with: docker compose --profile test up
  postgres-test:
    profiles: ["test"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - shared-net
      - app-net

  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/pytest.ini:/app/pytest.ini
    env_file:
      - .env.secret
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=sqlite:///./test.db
      - TRINO_HOST=trino
      - TRINO_PORT=8080

      # For trino connection tests
      - TEST_POSTGRES_HOST=postgres-test
      - TEST_POSTGRES_PORT=5432
      - TEST_POSTGRES_USER=test
      - TEST_POSTGRES_PASSWORD=test

      # For schema extraction tests
      # The pagila database is used for testing
      # Read more in README.md / Testing
      - TEST_PAGILA_HOST=pagila
      - TEST_PAGILA_PORT=5432
      - TEST_PAGILA_DB=postgres
      - TEST_POSTGRES_USER=postgres
      - TEST_POSTGRES_PASSWORD=123456
    command: python -m pytest -s tests/
    depends_on:
      db:
        condition: service_started
      trino:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
    networks:
      - shared-net
      - app-net

  # --- Test Company Database ---
  # Populated with 1000 employees, projects, salaries, vacations
  testbd-postgres:
    profiles: ["dev"]
    image: postgres:16-alpine
    container_name: testbd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testbd
    ports:
      - "5434:5432"
    volumes:
      - testbd_data:/var/lib/postgresql/data
      - ./testbdpostreSQL/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./testbdpostreSQL/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testbd"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

volumes:
  postgres_data:
  testbd_data:
  exports_data:
  trino_catalogs:

networks:
  app-net:
  shared-net: