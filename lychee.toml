# Lychee link checker configuration.
# Docs: https://lychee.cli.rs/usage/config/

# Verbosity and reporting.
verbose = "info"
no_progress = true

# Caching successful results between runs.
cache = true
max_cache_age = "1d"

# Network behaviour.
max_redirects = 10
max_retries = 2
retry_wait_time = 2
timeout = 20
max_concurrency = 8

# Accept these HTTP status codes as successful in addition to 2xx.
accept = [200, 201, 202, 203, 204, 206, 301, 302, 303, 304, 307, 308, 401, 403, 429]

# Skip links that require authentication, only work on the internal network,
# or rate-limit aggressively against anonymous CI clients.
exclude = [
    # Local backend on an Innopolis VM, only reachable from RU networks.
    "^http://194\\.226\\.97\\.77",
    # Local development URLs.
    "^http://localhost",
    "^http://127\\.0\\.0\\.1",
    # Figma blocks HEAD probes / rate-limits anonymous traffic.
    "^https://www\\.figma\\.com",
    # Google Drive requires session cookies to confirm reachability of `view` URLs.
    "^https://drive\\.google\\.com",
]

# Mail and tel links are not real URLs to check.
include_mail = false

# Do not check anchor fragments on remote pages.
include_fragments = false
