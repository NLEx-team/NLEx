coordinator=true
node-scheduler.include-coordinator=true

http-server.http.port=8080

discovery.uri=http://localhost:8080

catalog.management=dynamic

# --- Spill to disk ---
# Let memory-intensive operators (hash joins, aggregations, ORDER BY, window
# functions) spill intermediate data to local disk instead of failing when they
# exceed available memory. This is the main safeguard for large cross-catalog
# joins on a single node. /tmp is world-writable in the image, so no volume
# permission setup is needed (spill data is scratch/ephemeral by design).
spill-enabled=true
spiller-spill-path=/tmp/trino-spill
